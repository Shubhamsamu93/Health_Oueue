<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Login - HealthQueue</title>
    
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    
    <!-- Your CSS file -->
    <link rel="stylesheet" href="doctorstyle.css">
    <script src="../js/config.js"></script>
</head>
<body class="login-page">
    <!-- Background Pattern -->
    <div class="bg-pattern"></div>
    
    <!-- Full Width Container -->
    <div class="container-fluid min-vh-100 d-flex align-items-center justify-content-center p-3">
        <!-- Login Wrapper -->
        <div class="login-wrapper">
            <!-- Logo & Title -->
            <div class="text-center mb-5">
                <div class="logo-wrapper">
                    <i class="fas fa-user-md logo-icon"></i>
                </div>
                <h1 class="login-title mb-2">Doctor Portal</h1>
                <p class="login-subtitle">Access your HealthQueue Dashboard</p>
            </div>

            <!-- Login Form -->
            <form id="loginForm">
                <!-- Email Input -->
                <div class="input-group-wrapper mb-4">
                    <div class="input-icon-left">
                        <i class="fas fa-envelope input-icon"></i>
                    </div>
                    <input 
                        type="email" 
                        id="email" 
                        class="form-control login-input" 
                        placeholder="Enter your email"
                        required
                    >
                </div>

                <!-- Password Input -->
                <div class="input-group-wrapper mb-4">
                    <div class="input-icon-left">
                        <i class="fas fa-lock input-icon"></i>
                    </div>
                    <input 
                        type="password" 
                        id="password" 
                        class="form-control login-input" 
                        placeholder="Enter your password"
                        required
                    >
                    <button type="button" class="toggle-password" onclick="togglePassword()">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>

                <!-- Login Button -->
                <button type="submit" class="btn btn-login w-100 mb-4">
                    <span class="btn-text">
                        <i class="fas fa-sign-in-alt me-2"></i>Sign In
                    </span>
                    <div class="btn-loader d-none">
                        <i class="fas fa-spinner fa-spin"></i> Signing In...
                    </div>
                </button>
            </form>

            <!-- Divider -->
            <div class="divider">
                <span>New doctor?</span>
            </div>

            <!-- Signup Link -->
            <a href="signup.html" class="btn signup-btn w-100 mb-3">
                <i class="fas fa-user-plus me-2"></i>Create Doctor Account
            </a>

            <!-- Back to Home -->
            <div class="text-center">
                <a href="../index.html" class="back-link">
                    <i class="fas fa-arrow-left me-1"></i>Back to Home
                </a>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // Enhanced login with error handling
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const loginBtn = document.querySelector('.btn-login');
            const btnText = loginBtn.querySelector('.btn-text');
            const btnLoader = loginBtn.querySelector('.btn-loader');
            
            // Show loading state
            loginBtn.disabled = true;
            btnText.classList.add('d-none');
            btnLoader.classList.remove('d-none');
            
            try {
                const res = await fetch(`${window.API_BASE}/api/auth/login`, {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({
                         email,
                          password,
                          role: "doctor"
                        })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    localStorage.setItem("user", JSON.stringify(data.user));
                    localStorage.setItem("token", data.token);
                    
                    // Success redirect
                    setTimeout(() => {
                        window.location.href = "dashboard.html";
                    }, 1000);
                } else {
                    throw new Error(data.error || data.msg || 'Login failed');
                }
            } catch (error) {
                alert('❌ Login failed: ' + error.message);
            } finally {
                // Reset button
                loginBtn.disabled = false;
                btnText.classList.remove('d-none');
                btnLoader.classList.add('d-none');
            }
        });

        // Password visibility toggle
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.querySelector('.toggle-password i');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            }
        }
    </script>
</body>
</html>
