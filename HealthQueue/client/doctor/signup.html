<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Signup - HealthQueue</title>
    
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="doctorstyle.css">
    <script src="../js/config.js"></script>
</head>
<body class="signup-page">
    <!-- Background Pattern -->
    <div class="bg-pattern"></div>
    
    <!-- Main Container -->
    <div class="container-fluid min-vh-100 d-flex align-items-center justify-content-center p-3">
        <div class="signup-wrapper">
            <!-- Logo & Title -->
            <div class="text-center mb-5">
                <div class="logo-wrapper">
                    <i class="fas fa-user-md logo-icon"></i>
                </div>
                <h1 class="signup-title mb-2">Join as Doctor</h1>
                <p class="signup-subtitle">Create your HealthQueue account</p>
            </div>

            <!-- Signup Form -->
            <form id="signupForm" class="signup-form">
                <!-- Personal Info Row -->
                <div class="row g-3 mb-4">
                    <div class="col-md-6">
                        <div class="input-group-wrapper">
                            <div class="input-icon-left">
                                <i class="fas fa-user input-icon"></i>
                            </div>
                            <input 
                                type="text" 
                                id="name" 
                                class="form-control signup-input" 
                                placeholder="Full Name"
                                required
                            >
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="input-group-wrapper">
                            <div class="input-icon-left">
                                <i class="fas fa-phone input-icon"></i>
                            </div>
                            <input 
                                type="tel" 
                                id="phone" 
                                class="form-control signup-input" 
                                placeholder="Phone Number"
                                required
                            >
                        </div>
                    </div>
                </div>

                <!-- Email & Password Row -->
                <div class="row g-3 mb-4">
                    <div class="col-md-6">
                        <div class="input-group-wrapper">
                            <div class="input-icon-left">
                                <i class="fas fa-envelope input-icon"></i>
                            </div>
                            <input 
                                type="email" 
                                id="email" 
                                class="form-control signup-input" 
                                placeholder="Email Address"
                                required
                            >
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="input-group-wrapper">
                            <div class="input-icon-left">
                                <i class="fas fa-lock input-icon"></i>
                            </div>
                            <input 
                                type="password" 
                                id="password" 
                                class="form-control signup-input" 
                                placeholder="Password (min 8 chars)"
                                required
                            >
                            <button type="button" class="toggle-password" onclick="togglePassword()">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Professional Info Row -->
                <div class="row g-3 mb-4">
                    <div class="col-md-6">
                        <div class="input-group-wrapper">
                            <div class="input-icon-left">
                                <i class="fas fa-stethoscope input-icon"></i>
                            </div>
                            <select id="specialization" class="form-select signup-input" required>
                                <option value="" disabled selected>Select Specialization</option>
                                <option value="Cardiology">Cardiology</option>
                                <option value="Neurology">Neurology</option>
                                <option value="Orthopedics">Orthopedics</option>
                                <option value="Dentistry">Dentistry</option>
                                <option value="General Medicine">General Medicine</option>
                                <option value="Pediatrics">Pediatrics</option>
                                <option value="Dermatology">Dermatology</option>
                            </select>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="input-group-wrapper">
                            <div class="input-icon-left">
                                <i class="fas fa-briefcase-medical input-icon"></i>
                            </div>
                            <input 
                                type="number" 
                                id="experience" 
                                class="form-control signup-input" 
                                placeholder="Years of Experience"
                                min="1" max="50"
                                required
                            >
                        </div>
                    </div>
                </div>

                <!-- Terms & Conditions -->
                <div class="form-check mb-4">
                    <input class="form-check-input" type="checkbox" id="terms" required>
                    <label class="form-check-label" for="terms">
                        I agree to <a href="#" class="terms-link">Terms & Conditions</a> and 
                        <a href="#" class="terms-link">Privacy Policy</a>
                    </label>
                </div>

                <!-- Signup Button -->
                <button type="submit" class="btn btn-signup w-100 mb-4">
                    <span class="btn-text">
                        <i class="fas fa-user-plus me-2"></i>Create Account
                    </span>
                    <div class="btn-loader d-none">
                        <i class="fas fa-spinner fa-spin"></i> Creating Account...
                    </div>
                </button>
            </form>

            <!-- Divider -->
            <div class="divider">
                <span>Already have an account?</span>
            </div>

            <!-- Login Link -->
            <a href="login.html" class="btn btn-outline-primary w-100 login-btn">
                <i class="fas fa-sign-in-alt me-2"></i>Sign In Instead
            </a>

            <!-- Back to Home -->
            <div class="text-center mt-4">
                <a href="../index.html" class="back-link">
                    <i class="fas fa-arrow-left me-1"></i>Back to Home
                </a>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="signup.js"></script>
</body>
</html>
