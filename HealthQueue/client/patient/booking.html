<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Book Appointment • HealthQueue</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .booking-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .booking-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 40px;
            animation: slideDown 0.5s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header-info {
            color: white;
        }

        .header-info h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header-info p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid white;
            padding: 12px 24px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .back-btn:hover {
            background: white;
            color: #667eea;
            transform: translateX(-5px);
        }

        /* Progress Steps */
        .progress-container {
            display: flex;
            justify-content: space-between;
            margin-bottom: 40px;
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            animation: slideUp 0.6s ease 0.1s both;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .progress-item {
            flex: 1;
            text-align: center;
            position: relative;
            color: rgba(255, 255, 255, 0.6);
            transition: all 0.3s ease;
        }

        .progress-item::after {
            content: '';
            position: absolute;
            top: 30px;
            left: 50%;
            width: 100%;
            height: 3px;
            background: rgba(255, 255, 255, 0.2);
            margin-left: 15px;
            z-index: 0;
        }

        .progress-item:last-child::after {
            display: none;
        }

        .progress-number {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            border: 3px solid rgba(255, 255, 255, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: 600;
            margin: 0 auto 12px;
            position: relative;
            z-index: 1;
            transition: all 0.3s ease;
        }

        .progress-item.active .progress-number {
            background: #10b981;
            border-color: #10b981;
            color: white;
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.5);
            transform: scale(1.1);
        }

        .progress-item.completed .progress-number {
            background: #10b981;
            border-color: #10b981;
            color: white;
        }

        .progress-item.completed .progress-number::after {
            content: '✓';
            position: absolute;
            font-size: 1.2rem;
        }

        .progress-label {
            font-weight: 600;
            font-size: 1rem;
        }

        .progress-item.active .progress-label {
            color: white;
        }

        .progress-item.completed .progress-label {
            color: #10b981;
        }

        /* Main Content */
        .booking-content {
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
            animation: slideUp 0.6s ease 0.2s both;
        }

        .booking-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }

        .booking-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.4);
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 25px;
            color: #1f2937;
        }

        .section-title i {
            color: #667eea;
            font-size: 1.8rem;
        }

        /* Doctor Grid */
        .doctors-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            max-height: 500px;
            overflow-y: auto;
            padding: 10px;
            border-radius: 12px;
            background: #f9fafb;
        }

        .doctors-grid::-webkit-scrollbar {
            width: 8px;
        }

        .doctors-grid::-webkit-scrollbar-track {
            background: #e5e7eb;
            border-radius: 10px;
        }

        .doctors-grid::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 10px;
        }

        .doctors-grid::-webkit-scrollbar-thumb:hover {
            background: #764ba2;
        }

        .doctor-card {
            background: white;
            border: 2px solid #e5e7eb;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .doctor-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        .doctor-card:hover {
            border-color: #667eea;
            transform: translateY(-8px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.2);
        }

        .doctor-card.selected {
            border-color: #667eea;
            background: linear-gradient(135deg, #f0e7ff 0%, #f5f0ff 100%);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }

        .doctor-avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: 700;
            margin: 0 auto 15px;
        }

        .doctor-name {
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 5px;
            color: #1f2937;
        }

        .doctor-spec {
            font-size: 0.9rem;
            color: #6b7280;
            margin-bottom: 8px;
        }

        .doctor-exp {
            font-size: 0.85rem;
            color: #9ca3af;
            margin-bottom: 10px;
        }

        .doctor-card.selected .check-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 30px;
            height: 30px;
            background: #667eea;
            color: white;
            border-radius: 50%;
            font-size: 0.9rem;
            margin-top: 8px;
        }

        /* Date & Time Section */
        .datetime-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .form-group {
            margin-bottom: 0;
        }

        .form-label {
            font-weight: 600;
            color: #374151;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-label i {
            color: #667eea;
        }

        .form-control {
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background-color: #f9fafb;
        }

        .form-control:focus {
            border-color: #667eea;
            background-color: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        /* Textarea */
        .appointment-textarea {
            resize: vertical;
            min-height: 120px;
            font-family: inherit;
        }

        /* Selected Doctor Summary */
        .selected-summary {
            background: linear-gradient(135deg, #f0e7ff 0%, #e8d9ff 100%);
            border: 2px solid #667eea;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            display: none;
            animation: slideInUp 0.4s ease;
        }

        .selected-summary.show {
            display: block;
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .selected-summary-content {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .check-mark {
            width: 50px;
            height: 50px;
            background: #667eea;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            flex-shrink: 0;
        }

        .selected-info h6 {
            color: #667eea;
            font-size: 0.9rem;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .selected-info h5 {
            color: #1f2937;
            margin-bottom: 3px;
        }

        .selected-info p {
            color: #6b7280;
            margin: 0;
            font-size: 0.9rem;
        }

        /* Footer */
        .booking-footer {
            display: flex;
            gap: 15px;
            justify-content: flex-end;
            margin-top: 40px;
            padding-top: 30px;
            border-top: 2px solid #e5e7eb;
        }

        .btn-booking {
            padding: 14px 40px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn-cancel {
            background: #e5e7eb;
            color: #374151;
        }

        .btn-cancel:hover {
            background: #d1d5db;
            transform: translateY(-2px);
        }

        .btn-confirm {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }

        .btn-confirm:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.4);
        }

        .btn-confirm:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .booking-header {
                flex-direction: column;
                text-align: center;
                gap: 20px;
                margin-bottom: 30px;
            }

            .header-info h1 {
                font-size: 1.8rem;
            }

            .booking-card {
                padding: 25px;
            }

            .section-title {
                font-size: 1.2rem;
            }

            .doctors-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            }

            .progress-container {
                padding: 20px;
            }

            .progress-item {
                font-size: 0.9rem;
            }

            .progress-number {
                width: 50px;
                height: 50px;
                font-size: 1.1rem;
            }

            .booking-footer {
                flex-direction: column;
                justify-content: center;
            }

            .btn-booking {
                width: 100%;
                justify-content: center;
            }

            .datetime-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 10px;
            }

            .booking-card {
                padding: 20px;
            }

            .doctors-grid {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
                max-height: 400px;
            }

            .section-title {
                font-size: 1.1rem;
            }

            .header-info h1 {
                font-size: 1.5rem;
                gap: 8px;
            }

            .header-info h1 i {
                font-size: 1.5rem;
            }

            .progress-container {
                gap: 10px;
            }

            .progress-item::after {
                width: calc(100% - 30px);
            }
        }

        /* Loading state */
        .loading-doctors {
            text-align: center;
            padding: 40px 20px;
            color: #9ca3af;
        }

        .loading-doctors i {
            font-size: 2.5rem;
            margin-bottom: 15px;
            color: #667eea;
        }

        /* Message alerts */
        .alert-message {
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
            animation: slideDown 0.3s ease;
        }

        .alert-message.show {
            display: block;
        }

        .alert-message.error {
            background: #fee;
            color: #c33;
            border-left: 4px solid #c33;
        }

        .alert-message.success {
            background: #efe;
            color: #3c3;
            border-left: 4px solid #3c3;
        }
    </style>
    <script src="../js/config.js"></script>
</head>
<body>
    <div class="booking-container">
        <!-- Header -->
        <div class="booking-header">
            <div class="header-info">
                <h1><i class="fas fa-calendar-check"></i> Schedule Your Appointment</h1>
                <p>Select a doctor and choose your preferred time slot</p>
            </div>
            <a href="dashboard.html" class="back-btn">
                <i class="fas fa-arrow-left"></i> Back to Dashboard
            </a>
        </div>

        <!-- Progress Steps -->
        <div class="progress-container">
            <div class="progress-item active" id="progressStep1">
                <div class="progress-number">1</div>
                <div class="progress-label">Select Doctor</div>
            </div>
            <div class="progress-item" id="progressStep2">
                <div class="progress-number">2</div>
                <div class="progress-label">Date & Time</div>
            </div>
            <div class="progress-item" id="progressStep3">
                <div class="progress-number">3</div>
                <div class="progress-label">Confirm</div>
            </div>
        </div>

        <!-- Alert Messages -->
        <div class="alert-message" id="alertMessage"></div>

        <!-- Booking Content -->
        <div class="booking-content">
            <!-- Doctor Selection Card -->
            <div class="booking-card">
                <div class="section-title">
                    <i class="fas fa-users-medical"></i>
                    Available Doctors
                </div>
                <div class="doctors-grid" id="doctorsList">
                    <div class="loading-doctors">
                        <i class="fas fa-spinner fa-spin"></i>
                        <p>Loading doctors...</p>
                    </div>
                </div>
            </div>

            <!-- Selected Doctor Summary -->
            <div class="selected-summary" id="selectedSummary">
                <div class="selected-summary-content">
                    <div class="check-mark">
                        <i class="fas fa-check"></i>
                    </div>
                    <div class="selected-info">
                        <h6>Selected Doctor</h6>
                        <h5 id="selectedDoctorName">Dr. Name</h5>
                        <p id="selectedDoctorSpec">Specialization</p>
                    </div>
                </div>
            </div>

            <!-- Date & Time Card -->
            <div class="booking-card">
                <div class="section-title">
                    <i class="fas fa-clock"></i>
                    Date & Time
                </div>
                <div class="datetime-grid">
                    <div class="form-group">
                        <label class="form-label">
                            <i class="fas fa-calendar-alt"></i> Select Date
                        </label>
                        <input type="date" id="appointmentDate" class="form-control">
                    </div>
                    <div class="form-group">
                        <label class="form-label">
                            <i class="fas fa-hourglass-start"></i> Select Time
                        </label>
                        <input type="time" id="appointmentTime" class="form-control">
                    </div>
                </div>
            </div>

            <!-- Reason Card -->
            <div class="booking-card">
                <div class="section-title">
                    <i class="fas fa-notes-medical"></i>
                    Reason for Visit
                </div>
                <div class="form-group">
                    <label class="form-label">
                        <i class="fas fa-pen"></i> Describe Your Concern
                    </label>
                    <textarea id="visitReason" class="form-control appointment-textarea" placeholder="Describe your concern or reason for this appointment..."></textarea>
                </div>
            </div>

            <!-- Footer -->
            <div class="booking-footer">
                <button class="btn-booking btn-cancel" onclick="goBackDashboard()">
                    <i class="fas fa-times"></i> Cancel
                </button>
                <button class="btn-booking btn-confirm" id="confirmBookBtn" onclick="confirmBookAppointment()">
                    <i class="fas fa-check"></i> Confirm Booking
                </button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let selectedDoctor = null;
        let user = null;
        let allDoctors = [];

        function getDoctorPrimaryId(doctor) {
            return doctor?.userId || doctor?._id || doctor?.id || null;
        }

        function getDoctorProfileId(doctor) {
            return doctor?._id || doctor?.id || doctor?.userId || null;
        }

        // Initialize
        async function init() {
            try {
                // Get user from localStorage
                const userData = localStorage.getItem('user');
                if (!userData) {
                    window.location.href = 'login.html';
                    return;
                }
                user = JSON.parse(userData);
                
                // Load doctors
                await loadAllDoctors();

                const selectedDoctorId = sessionStorage.getItem('selectedDoctorId');
                if (selectedDoctorId) {
                    const index = allDoctors.findIndex(doc => String(getDoctorPrimaryId(doc)) === String(selectedDoctorId) || String(getDoctorProfileId(doc)) === String(selectedDoctorId));
                    if (index >= 0) {
                        const card = document.querySelectorAll('.doctor-card')[index];
                        if (card) {
                            selectDoctor(index, card);
                        }
                    }
                }
            } catch (error) {
                console.error('Init error:', error);
                showAlert('Error initializing page', 'error');
            }
        }

        // Load all doctors
        async function loadAllDoctors() {
            try {
                const response = await fetch(`${window.API_BASE}/api/doctors`);
                if (response.ok) {
                    allDoctors = await response.json();
                } else {
                    allDoctors = getDemoDoctors();
                }
                renderDoctors();
            } catch (error) {
                console.error('Error loading doctors:', error);
                allDoctors = getDemoDoctors();
                renderDoctors();
            }
        }

        // Demo doctors
        function getDemoDoctors() {
            return [
                { id: 1, name: 'Dr. Raj Patel', phone: '+91 9876543210', specialization: 'Cardiology', experience: 12, hospital: 'Apollo Hospital', availability: 'Mon-Wed-Fri' },
                { id: 2, name: 'Dr. Priya Singh', phone: '+91 9876543211', specialization: 'Neurology', experience: 8, hospital: 'Max Healthcare', availability: 'Tue-Thu-Sat' },
                { id: 3, name: 'Dr. Amit Sharma', phone: '+91 9876543212', specialization: 'Orthopedics', experience: 10, hospital: 'Metro Hospital', availability: 'Mon-Tue-Wed' },
                { id: 4, name: 'Dr. Sneha Verma', phone: '+91 9876543213', specialization: 'Dermatology', experience: 6, hospital: 'Apollo Hospital', availability: 'Thu-Fri-Sat' },
                { id: 5, name: 'Dr. Vikram Kapoor', phone: '+91 9876543214', specialization: 'Oncology', experience: 15, hospital: 'Max Healthcare', availability: 'Tue-Wed-Fri' },
                { id: 6, name: 'Dr. Anjali Gupta', phone: '+91 9876543215', specialization: 'Pediatrics', experience: 7, hospital: 'CloudNine Hospital', availability: 'Mon-Thu-Sat' }
            ];
        }

        // Render doctors
        function renderDoctors() {
            const doctorsList = document.getElementById('doctorsList');
            if (allDoctors.length === 0) {
                doctorsList.innerHTML = '<div class="loading-doctors"><p>No doctors available</p></div>';
                return;
            }

            doctorsList.innerHTML = allDoctors.map((doc, index) => `
                <div class="doctor-card" onclick="selectDoctor(${index}, this)">
                    <div class="doctor-avatar">${(doc.name || doc.name || 'Dr').charAt(0)}</div>
                    <div class="doctor-name">${doc.name || 'Dr. Unknown'}</div>
                    <div class="doctor-spec">${doc.specialization || 'General'}</div>
                    <div class="doctor-exp"><i class="fas fa-briefcase"></i> ${doc.experience || 0} yrs</div>
                    <div class="check-icon" style="display:none;"><i class="fas fa-check"></i></div>
                </div>
            `).join('');
        }

        // Select doctor
        function selectDoctor(index, element) {
            selectedDoctor = allDoctors[index];
            
            // Update progress
            document.getElementById('progressStep1').classList.add('completed');
            document.getElementById('progressStep1').classList.remove('active');
            document.getElementById('progressStep2').classList.add('active');
            
            // Update selected cards
            document.querySelectorAll('.doctor-card').forEach(card => {
                card.classList.remove('selected');
                card.querySelector('.check-icon').style.display = 'none';
            });
            element.classList.add('selected');
            element.querySelector('.check-icon').style.display = 'block';
            
            // Show summary
            document.getElementById('selectedDoctorName').textContent = selectedDoctor.name;
            document.getElementById('selectedDoctorSpec').textContent = selectedDoctor.specialization;
            document.getElementById('selectedSummary').classList.add('show');
            sessionStorage.setItem('selectedDoctorId', String(getDoctorPrimaryId(selectedDoctor) || getDoctorProfileId(selectedDoctor) || ''));
            
            // Scroll to date section
            setTimeout(() => {
                document.querySelector('.booking-card').scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 300);
        }

        // Show alert
        function showAlert(message, type) {
            const alertEl = document.getElementById('alertMessage');
            alertEl.textContent = message;
            alertEl.className = `alert-message show ${type}`;
            setTimeout(() => {
                alertEl.classList.remove('show');
            }, 4000);
        }

        // Confirm booking
        async function confirmBookAppointment() {
            // Validation
            if (!selectedDoctor) {
                showAlert('❌ Please select a doctor first', 'error');
                return;
            }
            
            const date = document.getElementById('appointmentDate').value;
            const time = document.getElementById('appointmentTime').value;
            const reason = document.getElementById('visitReason').value;
            
            if (!date) {
                showAlert('❌ Please select a date', 'error');
                return;
            }
            
            if (!time) {
                showAlert('❌ Please select a time', 'error');
                return;
            }
            
            if (!reason.trim()) {
                showAlert('❌ Please enter reason for visit', 'error');
                return;
            }

            if (!user || !(user._id || user.id)) {
                showAlert('❌ Patient login required before booking', 'error');
                return;
            }
            
            // Update progress
            document.getElementById('progressStep2').classList.add('completed');
            document.getElementById('progressStep2').classList.remove('active');
            document.getElementById('progressStep3').classList.add('active');

            const confirmBtn = document.getElementById('confirmBookBtn');
            const originalBtnHtml = confirmBtn.innerHTML;
            confirmBtn.disabled = true;
            confirmBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Booking...';

            try {
                const dateTimeString = `${date}T${time}`;
                const payload = {
                    patientId: user._id || user.id,
                    patientName: user.name || 'Patient',
                    doctorId: getDoctorPrimaryId(selectedDoctor),
                    token: '',
                    timeSlot: time,
                    time,
                    date: dateTimeString,
                    department: selectedDoctor.department || selectedDoctor.specialization || 'General OPD',
                    specialization: selectedDoctor.specialization || 'General Consultation',
                    reason: reason.trim(),
                    notes: '',
                    status: 'pending'
                };

                const response = await fetch(`${window.API_BASE}/api/appointments/book`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json().catch(() => ({}));
                if (!response.ok) {
                    throw new Error(data.message || data.msg || data.error || 'Booking failed');
                }

                const createdAppointment = data.appt || data.appointment || payload;
                const appointmentForLocal = {
                    _id: createdAppointment._id || createdAppointment.id || Date.now(),
                    appointmentId: createdAppointment._id || createdAppointment.id || Date.now(),
                    patientId: payload.patientId,
                    doctorId: payload.doctorId,
                    doctorName: selectedDoctor.name,
                    specialization: payload.specialization,
                    department: payload.department,
                    date: createdAppointment.date || payload.date,
                    time: createdAppointment.time || payload.time,
                    timeSlot: createdAppointment.timeSlot || payload.timeSlot,
                    reason: payload.reason,
                    token: createdAppointment.token || createdAppointment.tokenNumber || '',
                    status: createdAppointment.status || 'pending'
                };

                const appointments = JSON.parse(localStorage.getItem('appointments') || '[]');
                appointments.push(appointmentForLocal);
                localStorage.setItem('appointments', JSON.stringify(appointments));

                showAlert('✅ Appointment booked successfully! Redirecting...', 'success');
                sessionStorage.removeItem('selectedDoctorId');

                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1500);
            } catch (error) {
                console.error('Booking failed:', error);
                showAlert(`❌ ${error.message}`, 'error');
            } finally {
                confirmBtn.disabled = false;
                confirmBtn.innerHTML = originalBtnHtml;
            }
        }

        // Go back
        function goBackDashboard() {
            window.location.href = 'dashboard.html';
        }

        // Initialize on load
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
