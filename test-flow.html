<!DOCTYPE html>
<html>
<head>
    <title>Records Flow Test</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #282c34; color: #fff; }
        .section { margin: 20px 0; padding: 15px; background: #1e1e1e; border-left: 3px solid #61dafb; }
        .success { border-left-color: #52c41a; color: #52c41a; }
        .error { border-left-color: #f5222d; color: #f5222d; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; background: #61dafb; color: black; border: none; border-radius: 4px; }
        input { padding: 8px; margin: 5px; background: #1e1e1e; color: #fff; border: 1px solid #61dafb; }
    </style>
</head>
<body>
    <h1>🧪 Records Flow Tester</h1>
    
    <div class="section">
        <h3>Step 1: Setup Patient Data</h3>
        <button onclick="setupPatientData()">Setup Test Patient</button>
        <div id="step1-output"></div>
    </div>

    <div class="section">
        <h3>Step 2: Verify Patient ID</h3>
        <button onclick="verifyPatientId()">Check Patient ID</button>
        <div id="step2-output"></div>
    </div>

    <div class="section">
        <h3>Step 3: Test API Call</h3>
        <button onclick="testAPICall()">Call Records API</button>
        <div id="step3-output"></div>
    </div>

    <div class="section">
        <h3>Step 4: Simulate Redirect</h3>
        <button onclick="simulateRedirect()">Redirect to Records Page</button>
        <div id="step4-output"></div>
    </div>

    <div class="section">
        <h3>Step 5: Check Elements</h3>
        <button onclick="checkHTMLElements()">Check HTML Elements</button>
        <div id="step5-output"></div>
    </div>

    <script>
        function log(msg, type = '') {
            console.log(msg);
        }

        function output(msg, elementId, type = '') {
            const div = document.getElementById(elementId);
            const p = document.createElement('div');
            p.className = type;
            p.style.margin = '10px 0';
            p.textContent = msg;
            div.appendChild(p);
        }

        function setupPatientData() {
            const patientId = '69ce86be42172131e8e8a92b';
            const mockUser = {
                _id: patientId,
                id: patientId,
                name: 'Test Patient',
                email: 'patient1@healthqueue.com',
                phone: '9876543210',
                role: 'patient'
            };
            localStorage.setItem('user', JSON.stringify(mockUser));
            localStorage.setItem('token', 'test-token-12345');
            output('✅ Patient data stored in localStorage', 'step1-output', 'success');
            output(`Patient ID: ${patientId}`, 'step1-output', 'success');
            output(`Name: ${mockUser.name}`, 'step1-output', 'success');
        }

        function verifyPatientId() {
            const user = JSON.parse(localStorage.getItem('user') || 'null');
            if (!user) {
                output('❌ No user in localStorage', 'step2-output', 'error');
                return;
            }
            output(`✅ User found: ${user.name}`, 'step2-output', 'success');
            
            const patientId = user._id || user.id || user.patientId || '';
            if (!patientId) {
                output('❌ Patient ID not found', 'step2-output', 'error');
                return;
            }
            output(`✅ Patient ID: ${patientId}`, 'step2-output', 'success');
        }

        async function testAPICall() {
            const user = JSON.parse(localStorage.getItem('user') || 'null');
            if (!user) {
                output('❌ Setup patient data first!', 'step3-output', 'error');
                return;
            }
            
            const patientId = user._id || user.id || user.patientId || '';
            const apiUrl = `http://localhost:5000/api/records/patient/${patientId}`;
            
            output(`🌐 Calling: ${apiUrl}`, 'step3-output', '');
            
            try {
                const response = await fetch(apiUrl);
                output(`📊 Response status: ${response.status}`, 'step3-output', response.ok ? 'success' : 'error');
                
                const data = await response.json();
                output(`📦 Records count: ${Array.isArray(data) ? data.length : 'Not an array'}`, 'step3-output', 'success');
                
                if (Array.isArray(data) && data.length > 0) {
                    output(`✅ Sample record: ${data[0].diagnosis || data[0].doctorName || 'Record #1'}`, 'step3-output', 'success');
                }
            } catch (e) {
                output(`❌ API Error: ${e.message}`, 'step3-output', 'error');
            }
        }

        function simulateRedirect() {
            output('⏳ Redirecting in 2 seconds...', 'step4-output', '');
            setTimeout(() => {
                output('📍 Navigating to /patient/records.html', 'step4-output', 'success');
                window.location.href = '/patient/records.html';
            }, 2000);
        }

        function checkHTMLElements() {
            document.addEventListener('DOMContentLoaded', () => {
                const elementsToCheck = [
                    'actRecords',
                    'viewAllRecordsLink',
                    'recordsPageGrid',
                    'recordsLoadingState',
                    'recordsEmptyState',
                    'recordsErrorState'
                ];
                
                elementsToCheck.forEach(elementId => {
                    const el = document.getElementById(elementId);
                    const status = el ? '✅ Found' : '❌ Missing';
                    const className = el ? 'success' : 'error';
                    output(`${status}: #${elementId}`, 'step5-output', className);
                });
            });
            output('Checking elements...', 'step5-output', '');
        }
    </script>
</body>
</html>
